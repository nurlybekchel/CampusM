<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Market | Админ-панель</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <style>
      .seller-card-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(124, 92, 252, 0.1);
        border: 1px solid rgba(124, 92, 252, 0.25);
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--accent-3);
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="topbarMount"></div>

    <main class="shell">
      <div id="notice" class="notice hidden"></div>

      <section class="panel section">
        <div class="section-head">
          <h2>Админ-панель</h2>
          <button class="button secondary" id="refreshBtn" type="button">Обновить данные</button>
        </div>
        <div class="stats" id="stats"></div>
      </section>

      <section class="panel section">
        <h2>Пользователи</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Активен</th>
                <th>Объявления</th>
                <th>Создан</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel section">
        <h2>Объявления</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Категория</th>
                <th>Цена</th>
                <th>Продавец</th>
                <th>Карта продавца</th>
                <th>Статус</th>
                <th>Создано</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel section">
        <h2>Споры по сделкам</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID сделки</th>
                <th>Товар</th>
                <th>Покупатель</th>
                <th>Продавец</th>
                <th>Сумма</th>
                <th>Комментарий</th>
                <th>Открыт</th>
              </tr>
            </thead>
            <tbody id="disputesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/admin.js"></script>
  </body>
</html>
